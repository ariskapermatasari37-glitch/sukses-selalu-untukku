    <style amp-custom>
        /* ===== CSS VARIABLES ===== */
        :root {
            --neon-cyan: #00f5ff;
            --neon-magenta: #ff00aa;
            --neon-green: #39ff14;
            --neon-orange: #ff6b00;
            --deep-black: #020408;
            --panel-bg: rgba(0, 10, 20, 0.85);
            --border-glow: rgba(0, 245, 255, 0.3);
            --text-primary: #e0f7ff;
            --text-dim: rgba(180, 220, 240, 0.6);
            --grid-line: rgba(0, 245, 255, 0.06);
        }

        /* ===== RESET ===== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* ===== BODY & BACKGROUND ===== */
        body {
            background-color: var(--deep-black);
            color: var(--text-primary);
            font-family: 'Exo 2', 'Share Tech Mono', monospace;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* ===== ANIMATED GRID BACKGROUND ===== */
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image:
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridPulse 8s ease-in-out infinite;
        }

        @keyframes gridPulse {

            0%,
            100% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }
        }

        /* ===== SCANLINES OVERLAY ===== */
        .scanlines {
            position: fixed;
            inset: 0;
            z-index: 1;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 245, 255, 0.015) 2px,
                    rgba(0, 245, 255, 0.015) 4px);
            pointer-events: none;
        }

        /* ===== AMBIENT GLOW ORBS ===== */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            animation: orbFloat 12s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 245, 255, 0.12) 0%, transparent 70%);
            top: -100px;
            left: -100px;
            animation-duration: 15s;
        }

        .orb-2 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(255, 0, 170, 0.1) 0%, transparent 70%);
            bottom: 0;
            right: -80px;
            animation-duration: 18s;
            animation-delay: -6s;
        }

        .orb-3 {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(57, 255, 20, 0.08) 0%, transparent 70%);
            top: 40%;
            left: 50%;
            animation-duration: 10s;
            animation-delay: -3s;
        }

        @keyframes orbFloat {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(20px, -30px) scale(1.05);
            }

            66% {
                transform: translate(-15px, 20px) scale(0.95);
            }
        }

        /* ===== MAIN CONTAINER ===== */
        .container {
            position: relative;
            z-index: 10;
            max-width: 480px;
            margin: 0 auto;
            padding: 24px 16px 60px;
        }

        /* ===== HEADER / PROFILE SECTION ===== */
        .profile-section {
            text-align: center;
            padding: 40px 0 32px;
            animation: fadeSlideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(-20px);
        }

        @keyframes fadeSlideDown {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== AVATAR FRAME ===== */
        .avatar-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .avatar-ring {
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            background: conic-gradient(var(--neon-cyan) 0deg,
                    var(--neon-magenta) 120deg,
                    var(--neon-green) 240deg,
                    var(--neon-cyan) 360deg);
            animation: spinRing 4s linear infinite;
            z-index: -1;
        }

        .avatar-ring::after {
            content: '';
            position: absolute;
            inset: 3px;
            border-radius: 50%;
            background: var(--deep-black);
        }

        @keyframes spinRing {
            to {
                transform: rotate(360deg);
            }
        }

        .avatar-hexagon {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(0, 245, 255, 0.2), rgba(255, 0, 170, 0.2));
            border: 2px solid var(--neon-cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            box-shadow:
                0 0 20px rgba(0, 245, 255, 0.4),
                0 0 60px rgba(0, 245, 255, 0.15),
                inset 0 0 20px rgba(0, 245, 255, 0.1);
        }

        .avatar-emoji {
            font-size: 52px;
            line-height: 1;
            filter: drop-shadow(0 0 10px var(--neon-cyan));
            animation: avatarPulse 3s ease-in-out infinite;
        }

        @keyframes avatarPulse {

            0%,
            100% {
                transform: scale(1);
                filter: drop-shadow(0 0 10px var(--neon-cyan));
            }

            50% {
                transform: scale(1.05);
                filter: drop-shadow(0 0 20px var(--neon-cyan)) drop-shadow(0 0 40px var(--neon-magenta));
            }
        }

        .status-badge {

            background: var(--neon-green);
            border-radius: 50%;

            box-shadow: 0 0 10px var(--neon-green), 0 0 20px var(--neon-green);
            animation: statusBlink 2s ease-in-out infinite;

        @keyframes statusBlink {

        /* ===== USERNAME ===== */
        .username {

            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            position: relative;
            display: inline-block;
            animation: glitchText 3s steps(1) infinite;
        }

        @keyframes glitchText {

            0%,
            95%,
            100% {
                transform: translate(0, 0);
                filter: none;
            }

            96% {
                transform: translate(-2px, 0);
                filter: hue-rotate(90deg);
            }

            97% {
                transform: translate(2px, 0);
                filter: hue-rotate(-90deg);
            }

            98% {
                transform: translate(0, -1px);
                filter: saturate(3);
            }

            99% {
                transform: translate(0, 1px);
                filter: none;
            }
        }

        .stats-row {

        }

        @keyframes fadeSlideUp {

                transform: translateY(0);

        .stat-item {
            flex: 1;

        }

        .stat-item:not(:last-child)::after {
            content: '';

            top: 20%;
            height: 60%;
            width: 1px;
            background: var(--border-glow);
        }

        .stat-num {
            font-family: 'Orbitron', monospace;
            font-size: 18px;
            font-weight: 700;
            color: var(--neon-cyan);

        .stat-label {

        /* ===== SECTION DIVIDER ===== */
        .section-divider {

            align-items: center;
            gap: 12px;
            margin: 28px 0 16px;
            animation: fadeSlideUp 0.8s 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .divider-line {
            flex: 1;

            background: linear-gradient(90deg, transparent, var(--border-glow), transparent);

        .divider-label {

            letter-spacing: 3px;

        }

        .divider-icon {
            color: var(--neon-magenta);
            font-size: 12px;
        }

        /* ===== LINK BUTTONS ===== */
        .links-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .navbar-links {
            margin-bottom: 20px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            background: var(--panel-bg);
            border: 1px solid var(--border-glow);
            border-radius: 12px;
            text-decoration: none;
            color: var(--text-primary);
            position: relative;
            overflow: hidden;
            transition: transform 0.2s ease, border-color 0.2s ease;
            animation: fadeSlideUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* Staggered animation delays */
        .link-btn:nth-child(1) {
            animation-delay: 0.55s;
        }

        .link-btn:nth-child(2) {
            animation-delay: 0.65s;
        }

        .link-btn:nth-child(3) {
            animation-delay: 0.75s;
        }

        .link-btn:nth-child(4) {
            animation-delay: 0.85s;
        }

        .link-btn:nth-child(5) {
            animation-delay: 0.95s;
        }

        .link-btn:nth-child(6) {
            animation-delay: 1.05s;
        }

        .link-btn:nth-child(7) {
            animation-delay: 1.15s;
        }

        .link-btn:active {
            transform: scale(0.97);
        }

        /* Shimmer sweep effect */
        .link-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(105deg,
                    transparent 30%,
                    rgba(255, 255, 255, 0.04) 50%,
                    transparent 70%);
            transform: translateX(-100%);
            transition: transform 0s;
        }

        .link-btn:hover::before {
            transform: translateX(100%);
            transition: transform 0.6s ease;
        }

        /* Color accents per platform */
        .link-btn.daftar {

            --accent: #9147ff;
            --accent-glow: rgba(145, 71, 255, 0.2);
        }

            --accent: #00f2ea;
            --accent-glow: rgba(0, 242, 234, 0.2);
        }

        .link-btn.discord {
            --accent: #5865F2;
            --accent-glow: rgba(88, 101, 242, 0.2);
        }

        .link-btn.instagram {
            --accent: #E1306C;
            --accent-glow: rgba(225, 48, 108, 0.2);
        }

        .link-btn.livechat {

            --accent-glow: rgba(255, 107, 0, 0.2);
        }

        .link-btn:hover {
            border-color: var(--accent, var(--neon-cyan));
            box-shadow: 0 0 20px var(--accent-glow, rgba(0, 245, 255, 0.15));
        }

        /* Left accent strip */
        .link-btn::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--accent, var(--neon-cyan));
            box-shadow: 0 0 8px var(--accent, var(--neon-cyan));
            border-radius: 12px 0 0 12px;
        }

        /* Icon container */
        .link-icon {
            width: 42px;

        }

            color: var(--accent, var(--neon-cyan));
            opacity: 0.5;
            flex-shrink: 0;
            font-family: 'Share Tech Mono', monospace;

        /* ===== FEATURED CARD ===== */
        .featured-card {
            margin-bottom: 20px;

            align-items: flex-end;
            gap: 2px;
            height: 24px;
        }

        .wave-bar {
            width: 3px;
            background: var(--neon-cyan);
            border-radius: 2px;
            animation: waveAnim 1.2s ease-in-out infinite;
        }

        .wave-bar:nth-child(1) {
            height: 40%;
            animation-delay: 0s;
        }

        .wave-bar:nth-child(2) {
            height: 70%;
            animation-delay: 0.15s;
        }

        .wave-bar:nth-child(3) {
            height: 100%;
            animation-delay: 0.3s;
        }

        .wave-bar:nth-child(4) {
            height: 60%;
            animation-delay: 0.45s;
        }

        .wave-bar:nth-child(5) {
            height: 80%;
            animation-delay: 0.6s;
        }

        @keyframes waveAnim {

            0%,
            100% {
                transform: scaleY(1);
            }

            50% {
                transform: scaleY(0.3);
            }
        }

        /* ===== FOOTER ===== */
        .footer-section {
            text-align: center;
            padding-top: 28px;
            animation: fadeSlideUp 0.8s 1.3s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .footer-logo {
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            letter-spacing: 4px;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .footer-logo span {
            color: var(--neon-cyan);
        }

        .footer-line {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
            margin: 10px auto;
        }

            font-family: 'Share Tech Mono', monospace;
            font-size: 9px;
            letter-spacing: 2px;
            color: rgba(180, 220, 240, 0.3);
        }

        /* ===== CORNER DECORATIONS ===== */
        .corner-deco {
            position: fixed;
            width: 50px;
            height: 50px;
            z-index: 5;
            pointer-events: none;
        }

        .corner-deco.tl {
            top: 16px;
            left: 16px;
            border-top: 2px solid var(--neon-cyan);
            border-left: 2px solid var(--neon-cyan);
            opacity: 0.3;
        }

        .corner-deco.tr {
            top: 16px;
            right: 16px;
            border-top: 2px solid var(--neon-magenta);
            border-right: 2px solid var(--neon-magenta);
            opacity: 0.3;
        }

        .corner-deco.bl {
            bottom: 16px;
            left: 16px;
            border-bottom: 2px solid var(--neon-magenta);
            border-left: 2px solid var(--neon-magenta);
            opacity: 0.3;
        }

        .corner-deco.br {
            bottom: 16px;
            right: 16px;
            border-bottom: 2px solid var(--neon-cyan);
            border-right: 2px solid var(--neon-cyan);
            opacity: 0.3;
        }

        /* ===== FLOATING PARTICLES ===== */
        .particle {
            position: fixed;
            width: 2px;
            height: 2px;
            background: var(--neon-cyan);
            border-radius: 50%;
            pointer-events: none;
            z-index: 2;
            animation: particleFloat linear infinite;
            opacity: 0;
        }

        .particle:nth-child(1) {
            left: 10%;
            animation-duration: 12s;
            animation-delay: 0s;
            background: var(--neon-cyan);
        }

        .particle:nth-child(2) {
            left: 25%;
            animation-duration: 15s;
            animation-delay: -3s;
            background: var(--neon-magenta);
        }

        .particle:nth-child(3) {
            left: 45%;
            animation-duration: 10s;
            animation-delay: -6s;
            background: var(--neon-green);
        }

        .particle:nth-child(4) {
            left: 65%;
            animation-duration: 14s;
            animation-delay: -2s;
            background: var(--neon-cyan);
        }

        .particle:nth-child(5) {
            left: 80%;
            animation-duration: 11s;
            animation-delay: -8s;
            background: var(--neon-magenta);
        }

        .particle:nth-child(6) {
            left: 90%;
            animation-duration: 13s;
            animation-delay: -4s;
            background: var(--neon-green);
        }

        @keyframes particleFloat {
            0% {
                bottom: -10px;
                opacity: 0;
                transform: translateX(0);
            }

            10% {
                opacity: 0.6;
            }

            90% {
                opacity: 0.3;
            }

            100% {
                bottom: 100vh;
                opacity: 0;
                transform: translateX(30px);
            }
        }
